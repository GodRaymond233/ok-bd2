name: Build

on:
  push:
    tags:
      - "v*"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  prepare:
    runs-on: windows-latest
    outputs:
      package_mode: ${{ steps.package-mode.outputs.mode }}
      compression: ${{ steps.package-mode.outputs.compression }}
      reuse_tag: ${{ steps.launcher-reuse.outputs.reuse_tag }}
      start_tag: ${{ steps.sync.outputs.start_tag }}
      end_tag: ${{ steps.sync.outputs.end_tag }}
      changelog: ${{ steps.sync.outputs.changes_with_asterisk }}
    env:
      PYTHONIOENCODING: "UTF-8"
      PYTHONLEGACYWINDOWSSTDIO: "UTF-8"

    steps:
      - name: Configure git
        shell: pwsh
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          git config --global core.autocrlf false
          git config --global core.eol lf
          git config --global user.email "GodRaymond233@users.noreply.github.com"
          git config --global user.name "GodRaymond233"

      - uses: actions/checkout@v7
        with:
          lfs: true
          fetch-depth: 0

      - name: Resolve package mode
        id: package-mode
        shell: pwsh
        env:
          REQUESTED_MODE: ${{ vars.PACKAGE_BUILD_MODE }}
        run: |
          $mode = $env:REQUESTED_MODE.Trim().ToLowerInvariant()
          if ([string]::IsNullOrWhiteSpace($mode)) {
            $mode = "fast"
          }
          if ($mode -notin @("fast", "compact")) {
            throw "PACKAGE_BUILD_MODE must be 'fast' or 'compact', got '$mode'."
          }
          $compression = if ($mode -eq "fast") { "zlib" } else { "lzma" }
          "mode=$mode" >> $env:GITHUB_OUTPUT
          "compression=$compression" >> $env:GITHUB_OUTPUT
          Write-Host "Package mode: $mode; NSIS compression: $compression"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Inline ok-script for update repository
        run: |
          python -m ok.update.inline_ok_requirements --tag ${{ github.ref_name }}

      - name: Run tests
        run: |
          python -m unittest discover tests

      - name: Validate release secrets
        shell: pwsh
        env:
          OK_GH: ${{ secrets.OK_GH }}
          CNB_GH: ${{ secrets.CNB_GH }}
        run: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:OK_GH)) { $missing += "OK_GH" }
          if ([string]::IsNullOrWhiteSpace($env:CNB_GH)) { $missing += "CNB_GH" }
          if ($missing.Count -gt 0) {
            throw "Missing GitHub Actions secrets: $($missing -join ', ')"
          }

      - name: Sync update repositories
        id: sync
        uses: ok-oldking/partial-sync-repo@bbd55c1dffbcc1292a12295d949e7807b35ea93e
        with:
          repos: |
            https://cnb:${{ secrets.CNB_GH }}@cnb.cool/GodRaymond233/ok-bd2-update.git
            https://GodRaymond233:${{ secrets.OK_GH }}@github.com/GodRaymond233/ok-bd2-update.git
          sync_list: "deploy.txt"
          tag: ${{ github.ref_name }}
          gitignore_file: ".update_repo_gitignore"
          show_author: true

      - name: Find reusable launcher
        id: launcher-reuse
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $previousTag = git describe --tags --abbrev=0 "$env:RELEASE_TAG^" 2>$null
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($previousTag)) {
            "reuse_tag=" >> $env:GITHUB_OUTPUT
            Write-Host "No previous tag is available; the launcher will be compiled."
            exit 0
          }
          $previousTag = $previousTag.Trim()

          git diff --quiet "$previousTag..$env:RELEASE_TAG" -- `
            pyappify.yml `
            icons `
            scripts/prepare_pyappify_launcher.ps1
          $diffExitCode = $LASTEXITCODE
          if ($diffExitCode -gt 1) {
            throw "Could not compare launcher inputs with $previousTag."
          }
          if ($diffExitCode -eq 1) {
            "reuse_tag=" >> $env:GITHUB_OUTPUT
            Write-Host "Launcher inputs changed since $previousTag; the launcher will be compiled."
            exit 0
          }

          $assetNames = @(gh release view $previousTag `
            --repo $env:GITHUB_REPOSITORY `
            --json assets `
            --jq '.assets[].name' 2>$null)
          if ($LASTEXITCODE -ne 0 -or $assetNames -notcontains "ok-bd2-win32.zip") {
            "reuse_tag=" >> $env:GITHUB_OUTPUT
            Write-Host "Release $previousTag has no reusable launcher asset; the launcher will be compiled."
            exit 0
          }

          "reuse_tag=$previousTag" >> $env:GITHUB_OUTPUT
          Write-Host "Launcher will be reused from $previousTag."

  package-fast:
    needs: prepare
    if: needs.prepare.outputs.package_mode == 'fast'
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REUSE_TAG: ${{ needs.prepare.outputs.reuse_tag }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Prepare or restore launcher
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:REUSE_TAG)) {
            .\scripts\prepare_pyappify_launcher.ps1 -Version v1.1.7 -NsisCompression zlib
          } else {
            .\scripts\prepare_pyappify_launcher.ps1 -Version v1.1.7 -NsisCompression zlib -SkipBuild
            .\scripts\restore_pyappify_launcher.ps1 -ReleaseTag $env:REUSE_TAG
          }

      - name: Build fast release assets
        id: build-assets
        uses: ok-oldking/pyappify-action@56459bdb910ea3f0db3bbf99ec3d44108f35eb4e
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          version: v1.1.7

      - name: Validate fast release assets
        shell: pwsh
        run: |
          $required = @(
            "pyappify_dist/ok-bd2-win32-China-setup.exe",
            "pyappify_dist/ok-bd2-win32-Global-setup.exe",
            "pyappify_dist/ok-bd2-win32-online-setup.exe",
            "pyappify_dist/ok-bd2-win32.zip",
            "pyappify_dist/win32_sha256.txt"
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Missing release asset: $path"
            }
          }

      - name: Prepare release notes
        shell: pwsh
        env:
          START_TAG: ${{ needs.prepare.outputs.start_tag }}
          END_TAG: ${{ needs.prepare.outputs.end_tag }}
          CHANGELOG: ${{ needs.prepare.outputs.changelog }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          .\scripts\prepare_release_notes.ps1 `
            -StartTag $env:START_TAG `
            -EndTag $env:END_TAG `
            -Changelog $env:CHANGELOG `
            -ReleaseTag $env:RELEASE_TAG

      - name: Release fast assets
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          body_path: release-notes.md
          draft: false
          prerelease: false
          make_latest: true
          files: pyappify_dist/*

  package-compact:
    needs: prepare
    if: needs.prepare.outputs.package_mode == 'compact'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: China
            artifact_name: release-assets-China
            asset_paths: |
              pyappify_dist/ok-bd2-win32-China-setup.exe
              pyappify_dist/ok-bd2-win32-online-setup.exe
              pyappify_dist/ok-bd2-win32.zip
              pyappify_dist/win32_sha256.txt
          - profile: Global
            artifact_name: release-assets-Global
            asset_paths: |
              pyappify_dist/ok-bd2-win32-Global-setup.exe
    env:
      GH_TOKEN: ${{ github.token }}
      REUSE_TAG: ${{ needs.prepare.outputs.reuse_tag }}

    steps:
      - uses: actions/checkout@v7

      - name: Select ${{ matrix.profile }} profile
        shell: pwsh
        run: |
          .\scripts\select_pyappify_profile.ps1 -Profile ${{ matrix.profile }}

      - name: Prepare or restore launcher
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:REUSE_TAG)) {
            .\scripts\prepare_pyappify_launcher.ps1 -Version v1.1.7 -NsisCompression lzma
          } else {
            .\scripts\prepare_pyappify_launcher.ps1 -Version v1.1.7 -NsisCompression lzma -SkipBuild
            .\scripts\restore_pyappify_launcher.ps1 -ReleaseTag $env:REUSE_TAG
          }

      - name: Build ${{ matrix.profile }} compact assets
        uses: ok-oldking/pyappify-action@56459bdb910ea3f0db3bbf99ec3d44108f35eb4e
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          version: v1.1.7

      - name: Upload ${{ matrix.profile }} release assets
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_paths }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  release-compact:
    needs:
      - prepare
      - package-compact
    if: needs.prepare.outputs.package_mode == 'compact' && needs.package-compact.result == 'success'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download compact release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: pyappify_dist
          merge-multiple: true

      - name: Validate compact release assets
        shell: pwsh
        run: |
          $required = @(
            "pyappify_dist/ok-bd2-win32-China-setup.exe",
            "pyappify_dist/ok-bd2-win32-Global-setup.exe",
            "pyappify_dist/ok-bd2-win32-online-setup.exe",
            "pyappify_dist/ok-bd2-win32.zip",
            "pyappify_dist/win32_sha256.txt"
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Missing release asset: $path"
            }
          }

      - name: Prepare release notes
        shell: pwsh
        env:
          START_TAG: ${{ needs.prepare.outputs.start_tag }}
          END_TAG: ${{ needs.prepare.outputs.end_tag }}
          CHANGELOG: ${{ needs.prepare.outputs.changelog }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          .\scripts\prepare_release_notes.ps1 `
            -StartTag $env:START_TAG `
            -EndTag $env:END_TAG `
            -Changelog $env:CHANGELOG `
            -ReleaseTag $env:RELEASE_TAG

      - name: Release compact assets
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          body_path: release-notes.md
          draft: false
          prerelease: false
          make_latest: true
          files: pyappify_dist/*
